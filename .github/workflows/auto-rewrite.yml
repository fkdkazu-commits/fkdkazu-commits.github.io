name: Auto Rewrite

on:
  schedule:
    - cron: '0 22 * * *'  # 毎日 AM 7:00 JST (UTC 22:00)
  workflow_dispatch:

jobs:
  rewrite:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run AI rewrite via Claude.ai (Playwright)
        env:
          CLAUDE_COOKIES: ${{ secrets.CLAUDE_COOKIES }}
          SITE_URL: https://fkdkazu-commits.github.io/ai-seo-blog
        run: npm run rewrite

      - name: Commit rewritten article
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "refactor: AIリライト $(date '+%Y-%m-%d')"
          git push
      # mainへのpushでdeploy.ymlが自動起動し、GitHub Pagesへデプロイされる
