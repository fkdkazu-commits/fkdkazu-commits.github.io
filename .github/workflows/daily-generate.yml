name: Daily Article Generation (Playwright)

on:
  schedule:
    - cron: '0 20 * * *'  # 毎日 AM 5:00 JST (UTC 20:00)
  workflow_dispatch:

jobs:
  generate:
    runs-on: self-hosted
    timeout-minutes: 150
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Generate article via Claude.ai (5-step pipeline)
        env:
          # GitHub Secrets に保存したClaude.aiのセッションCookie (JSON配列)
          CLAUDE_COOKIES: ${{ secrets.CLAUDE_COOKIES }}
        run: npm run generate
        # 5ステップ×最大10分 + バッファ = 最大60分

      - name: Sync OG image cache with git
        run: git clean -fd -- public/og/

      - name: Generate OG image
        env:
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: npm run og

      - name: Add internal links to existing articles
        env:
          CLAUDE_COOKIES: ${{ secrets.CLAUDE_COOKIES }}
        run: npm run link
        # 新記事はstep5で処理済み。既存記事の内部リンク更新を担当

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet; if (-not $?) { git commit -m "feat: 記事自動生成 $(Get-Date -Format 'yyyy-MM-dd')" }
          git push
      # mainへのpushでdeploy.ymlが自動起動しGitHub Pagesへデプロイされる
