name: Daily Article Generation (Playwright)

on:
  schedule:
    - cron: '0 20 * * *'  # 毎日 AM 5:00 JST (UTC 20:00)
  workflow_dispatch:

jobs:
  generate:
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Generate article via Claude.ai (Playwright)
        env:
          # GitHub Secrets に保存したClaude.aiのセッションCookie (JSON配列)
          CLAUDE_COOKIES: ${{ secrets.CLAUDE_COOKIES }}
        run: npm run generate

      - name: Generate OG image
        run: npm run og

      - name: Add internal links
        env:
          CLAUDE_COOKIES: ${{ secrets.CLAUDE_COOKIES }}
        run: npm run link

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "feat: 記事自動生成 $(Get-Date -Format 'yyyy-MM-dd')"
          git push
      # mainへのpushでdeploy.ymlが自動起動しGitHub Pagesへデプロイされる
